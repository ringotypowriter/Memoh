name: OpenAI
client_type: openai-responses
icon: https://cdn.openai.com/API/logo-assets/openai-logomark.png
base_url: https://api.openai.com/v1

models:
  - model_id: o3
    name: o3
    type: chat
    config:
      compatibilities: [vision, tool-call, reasoning]
      context_window: 200000

  - model_id: o3-mini
    name: o3 Mini
    type: chat
    config:
      compatibilities: [tool-call, reasoning]
      context_window: 200000

  - model_id: o4-mini
    name: o4 Mini
    type: chat
    config:
      compatibilities: [vision, tool-call, reasoning, image-output]
      context_window: 200000

  - model_id: gpt-4.1
    name: GPT-4.1
    type: chat
    config:
      compatibilities: [vision, tool-call]
      context_window: 1047576

  - model_id: gpt-4.1-mini
    name: GPT-4.1 Mini
    type: chat
    config:
      compatibilities: [vision, tool-call]
      context_window: 1047576

  - model_id: gpt-4.1-nano
    name: GPT-4.1 Nano
    type: chat
    config:
      compatibilities: [vision, tool-call]
      context_window: 1047576

  - model_id: gpt-4o
    name: GPT-4o
    type: chat
    config:
      compatibilities: [vision, tool-call]
      context_window: 128000

  - model_id: gpt-4o-mini
    name: GPT-4o Mini
    type: chat
    config:
      compatibilities: [vision, tool-call]
      context_window: 128000

  - model_id: text-embedding-3-small
    name: Embedding 3 Small
    type: embedding
    config:
      dimensions: 1536

  - model_id: text-embedding-3-large
    name: Embedding 3 Large
    type: embedding
    config:
      dimensions: 3072
